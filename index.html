<!DOCTYPE html>
<html lang="sr">
  <head>
    <meta charset="utf-8" />
    <title>QR generator</title>
    <meta name="viewport" content="width=device-width, initial-scale=1, maximum-scale=4, user-scalable=yes" />
    <meta name="referrer" content="same-origin" />
    <meta name="X-Frame-Options" content="DENY" />
    <meta name="description" content="Jednostavan bulk QR generator sa SVG izlazom." />
    <link rel="stylesheet" href="styles.css" />
  </head>

  <body>
    <header>
      <h1>QR generator</h1>
      <p>Unesi svaku stavku u novi red. Do 1000 kodova po generisanju.</p>
    </header>

    <main class="grid grid-2">
      <!-- LEVA KARTICA: unos i akcije -->
      <section class="panel">
        <div class="panel_body">
          <div class="fieldset inputs">
            <textarea id="links" class="textarea" spellcheck="false" 
            placeholder="
            Ovde unesite listu za QR kodove;
            jedan QR za svaki novi red; 
            prazne linije se ignorišu..."></textarea>

            <div class="actions">
              <button class="btn" id="generate">Generiši QR kodove</button>
              <button class="btn btn--ghost" id="downloadAllPng" style="display:none">Preuzmi sve (PNG)</button>
              <button class="btn btn--ghost" id="downloadAllSvg" style="display:none">Preuzmi sve (SVG)</button>
              <button class="btn btn--ghost" id="downloadListBtn">Preuzmi listu (.txt)</button>
              <button class="btn btn--ghost" id="uploadBtn">Učitaj listu (.txt)</button>
              <input type="file" id="upload" accept="text/plain" style="display:none">
            </div>
          </div>
        </div>
      </section>

      <!-- DESNA KARTICA: podešavanja -->
      <aside class="panel">
        <div class="panel_body">
          <div class="fieldset">
            <h3 style="margin: 0 0 10px 0; font-size: 14px; font-weight: 700; color: var(--brand);">Izgled i boja</h3>
            
            <div style="margin-bottom: 10px;">
              <label for="qrStyle">Stil modula (oblik tačaka)</label>
              <select id="qrStyle" class="select">
                <option value="square" selected>Kvadratni (Klasični)</option>
                <option value="rounded">Zaobljeni moduli</option>
                <option value="dots">Kružni (Tačke)</option>
                <option value="diamond">Dijamanti</option>
              </select>
            </div>

            <div>
              <label for="fgcolor">Boja QR koda</label>
              <input id="fgcolor" type="color" value="#000000" class="color">
            </div>

            <hr style="border:0; border-top:1px solid var(--ring); margin:14px 0 10px 0;">

            <h3 style="margin: 0 0 10px 0; font-size: 14px; font-weight: 700; color: var(--brand);">Podešavanja papira i štampanja</h3>
            
            <div class="fieldset__row">
              <div>
                <label for="paperWidth">Širina papira (mm)</label>
                <input id="paperWidth" type="number" min="10" max="2000" value="210" class="input">
              </div>
              <div>
                <label for="paperHeight">Visina papira (mm)</label>
                <input id="paperHeight" type="number" min="10" max="2000" value="297" class="input">
              </div>
            </div>

            <div class="fieldset__row" style="margin-top:8px;">
              <div>
                <label for="colsCount">Broj po horizontali</label>
                <input id="colsCount" type="number" min="1" max="50" value="3" class="input" placeholder="Kolone">
              </div>
              <div>
                <label for="rowsCount">Broj po vertikali</label>
                <input id="rowsCount" type="number" min="1" max="50" value="4" class="input" placeholder="Redovi">
              </div>
            </div>

            <div class="fieldset__row" style="margin-top:8px;">
              <div>
                <label for="paperMargin">Margina papira (mm)</label>
                <input id="paperMargin" type="number" min="0" max="100" value="10" class="input">
              </div>
              <div>
                <label for="itemGap">Razmak kodova (mm)</label>
                <input id="itemGap" type="number" min="0" max="50" value="4" class="input">
              </div>
            </div>

            <div style="margin-top: 14px;">
              <button class="btn" id="print" style="width: 100%; display: none; justify-content: center; align-items: center; gap: 8px; font-size: 15px; padding: 12px; background: #0891b2; border: none; border-radius: 10px;">
                🖨️ Štampaj QR kodove
              </button>
            </div>
          </div>
        </div>
      </aside>

      <!-- PRIKAZ KODOVA -->
      <section class="panel" style="grid-column:1 / -1;">
        <div class="panel_body">
          <div id="codes" class="codes"></div>
        </div>
      </section>
    </main>

    <footer class="noprint">
      <div class="panel">
          <p>&copy; <span id="year"></span>. <a target="_blank" href="http://www.opensource.org/licenses/mit-license.php">MIT License</a></p>
          <p>&#10084; opensource &#10084;</p>
      </div>
    </footer>

    <script src="app.js"></script>
  </body>
</html>
